<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Lens & Light</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="logo">Lens & Light</a>
            <ul class="nav-links">
                <li><a href="index.html">Portfolio</a></li>
                <li><a href="pricing.html">Pricing</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-form">
            <h1>Let's Create Together</h1>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john.doe@email.com" required>
                </div>
                <div class="form-group">
                    <label for="package">Interested Package</label>
                    <select id="package" name="package">
                        <option value="portrait">Basic Portrait Session</option>
                        <option value="event">Event Coverage</option>
                        <option value="wedding">Wedding Premium</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Tell me about your vision</label>
                    <textarea id="message" name="message" rows="6" placeholder="Describe the project..."></textarea>
                </div>
                <button type="submit" class="btn">Send Inquiry</button>
            </form>
        </section>
    </main>

</body>
</html>
