<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | NOVA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header style="background-color: var(--bg-card);">
        <nav>
            <a href="index.html" class="logo"><span>N</span>OVA</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="pricing.html">Pricing</a></li>
                <li><a href="contact.html" style="color: var(--accent);">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-header" style="padding-bottom: 40px;">
        <h1>Let's Work Together</h1>
        <p style="color: var(--text-muted);">Fill out the form below and I will get back to you within 24 hours.</p>
    </div>

    <main class="contact-page-wrapper">
        <section class="contact-form-card">
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="package">Interested Package</label>
                    <select id="package" name="package">
                        <option value="portrait">Basic Portrait Session</option>
                        <option value="event">Event Coverage</option>
                        <option value="wedding">Wedding Premium</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="message">Tell me about your vision</label>
                    <textarea id="message" name="message" rows="6"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; border: none; cursor: pointer;">Send Inquiry</button>
            </form>
        </section>
    </main>

</body>
</html>
